name: Download Telegram (tar.xz)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download Telegram tar.xz
        run: |
          curl -L -o telegram.tar.xz https://telegram.org/dl/desktop/linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-tar
          path: telegram.tar.xz
