name: Download Postman (tar.gz)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download Postman tar.gz
        run: |
          curl -L -o postman.tar.gz https://dl.pstmn.io/download/latest/linux_64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: postman-tar
          path: postman.tar.gz
