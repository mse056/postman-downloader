name: Download Sublime Text

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download Sublime Text .deb
        run: |
          curl -L -o sublime-text.deb https://download.sublimetext.com/sublime-text_build-3211_amd64.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sublime-text-deb
          path: sublime-text.deb
