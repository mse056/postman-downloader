name: Download Telegram Debian Package

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download Telegram .deb
        run: |
          curl -L -o telegram.deb https://updates.tdesktop.com/tlinux/tsetup.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-deb
          path: telegram.deb
